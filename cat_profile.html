<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MeowScan — Perfil de Gato</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#FFF9F0 0%,#FFE8E8 50%,#F0E8FF 100%);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.card {
  background:white;
  border-radius:32px;
  padding:32px 28px;
  max-width:380px; width:100%;
  box-shadow:0 20px 60px rgba(255,107,107,0.15),0 8px 30px rgba(0,0,0,0.08);
  position:relative; overflow:hidden;
}
.card::before {
  content:'';
  position:absolute; top:-60px; right:-60px;
  width:200px; height:200px;
  background:radial-gradient(circle,rgba(255,107,107,0.08) 0%,transparent 70%);
  border-radius:50%;
}
.header {
  display:flex; align-items:center; gap:10px;
  margin-bottom:24px;
}
.logo {
  width:40px; height:40px;
  background:linear-gradient(135deg,#FF6B6B,#A29BFE);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
}
.app-name { font-size:18px; font-weight:900; color:#FF6B6B; }
.badge {
  margin-left:auto;
  background:rgba(78,205,196,0.12);
  border:1.5px solid rgba(78,205,196,0.4);
  color:#4ECDC4; font-size:11px; font-weight:800;
  padding:4px 10px; border-radius:20px;
}
.photo-section { display:flex; justify-content:center; margin-bottom:20px; }
.photo-wrap { position:relative; }
.cat-photo {
  width:120px; height:120px; border-radius:50%; object-fit:cover;
  border:4px solid white;
  box-shadow:0 8px 24px rgba(255,107,107,0.25);
}
.photo-placeholder {
  width:120px; height:120px; border-radius:50%;
  background:linear-gradient(135deg,rgba(255,107,107,0.1),rgba(162,155,254,0.1));
  border:4px solid white;
  box-shadow:0 8px 24px rgba(255,107,107,0.12);
  display:flex; align-items:center; justify-content:center;
  font-size:52px;
}
.status-dot {
  position:absolute; bottom:6px; right:6px;
  width:22px; height:22px;
  background:#55EFC4; border:3px solid white; border-radius:50%;
}
.cat-name {
  text-align:center; font-size:34px; font-weight:900;
  color:#2D3436; margin-bottom:4px;
}
.owner-name {
  text-align:center; font-size:15px; font-weight:700;
  color:#B2BEC3; margin-bottom:20px;
}
.owner-name span { color:#A29BFE; }
.chips {
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center; margin-bottom:24px;
}
.chip {
  padding:6px 14px; border-radius:20px;
  font-size:13px; font-weight:700;
}
.chip-coral  { background:rgba(255,107,107,0.1); color:#FF6B6B; border:1.5px solid rgba(255,107,107,0.3); }
.chip-purple { background:rgba(162,155,254,0.12); color:#A29BFE; border:1.5px solid rgba(162,155,254,0.3); }
.chip-teal   { background:rgba(78,205,196,0.1);  color:#4ECDC4; border:1.5px solid rgba(78,205,196,0.3); }
.chip-yellow { background:rgba(255,230,109,0.15); color:#F9A825; border:1.5px solid rgba(255,230,109,0.4); }
.divider { height:1px; background:#F0F0F0; margin:0 0 20px; }
.whatsapp-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:16px;
  background:linear-gradient(135deg,#25D366,#128C7E);
  border-radius:18px; border:none; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:17px; font-weight:900;
  color:white; text-decoration:none;
  box-shadow:0 8px 20px rgba(37,211,102,0.3);
  transition:transform 0.15s,box-shadow 0.15s;
}
.whatsapp-btn:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(37,211,102,0.4); }
.whatsapp-btn:active { transform:scale(0.97); }
.whatsapp-icon { font-size:24px; }
.footer {
  text-align:center; margin-top:20px;
  font-size:11px; color:#B2BEC3; font-weight:600;
}
.footer span { color:#FF6B6B; }
.not-found {
  text-align:center; padding:20px;
}
.not-found .emoji { font-size:64px; margin-bottom:16px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <div class="logo">🐱</div>
    <span class="app-name">MeowScan</span>
    <span class="badge">ID DIGITAL</span>
  </div>
  <div id="content"></div>
  <div class="footer">Generado con <span>MeowScan</span> · ID Digital Felino</div>
</div>

<script>
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    nombre:   decodeURIComponent(p.get('nombre')  || ''),
    dueno:    decodeURIComponent(p.get('dueno')   || ''),
    raza:     decodeURIComponent(p.get('raza')    || ''),
    edad:     decodeURIComponent(p.get('edad')    || ''),
    whatsapp: decodeURIComponent(p.get('wa')      || ''),
    foto:     decodeURIComponent(p.get('foto')    || ''),
  };
}

function render() {
  const d = getParams();
  const content = document.getElementById('content');

  if (!d.nombre) {
    content.innerHTML = `
      <div class="not-found">
        <div class="emoji">😿</div>
        <p style="font-size:18px;font-weight:800;color:#2D3436;margin-bottom:8px">QR inválido</p>
        <p style="color:#B2BEC3;font-size:14px">Este código QR no tiene datos válidos.</p>
      </div>`;
    return;
  }

  const fotoHtml = d.foto
    ? `<img src="${d.foto}" class="cat-photo" onerror="this.outerHTML='<div class=\\'photo-placeholder\\'>🐱</div>'">`
    : `<div class="photo-placeholder">🐱</div>`;

  const waNum = d.whatsapp.replace(/\D/g,'');
  const waUrl = `https://wa.me/${waNum}?text=¡Hola! Encontré a ${d.nombre} 🐱`;

  content.innerHTML = `
    <div class="photo-section">
      <div class="photo-wrap">
        ${fotoHtml}
        <div class="status-dot"></div>
      </div>
    </div>
    <div class="cat-name">${d.nombre}</div>
    <div class="owner-name">Dueño: <span>${d.dueno}</span></div>
    <div class="chips">
      ${d.raza  ? `<span class="chip chip-purple">🧬 ${d.raza}</span>` : ''}
      ${d.edad  ? `<span class="chip chip-coral">🎂 ${d.edad}</span>`  : ''}
      <span class="chip chip-teal">✅ Tiene dueño</span>
      <span class="chip chip-yellow">📱 WhatsApp activo</span>
    </div>
    <div class="divider"></div>
    <a href="${waUrl}" class="whatsapp-btn" target="_blank">
      <span class="whatsapp-icon">💬</span>
      Contactar al dueño
    </a>`;
}

render();
</script>
</body>
</html>
