name: meowscan
description: Análisis felino con IA - Raza, peso, color, estado corporal, mood y más.
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0

  # Cámara
  camera: ^0.10.5+9

  # HTTP para comunicación con el backend
  http: ^1.2.0

  # Permisos
  permission_handler: ^11.3.0

  # Gráficos
  fl_chart: ^0.67.0

  # Fuentes
  google_fonts: ^6.2.1

  # Guardar preferencias (IP, usuario, etc)
  shared_preferences: ^2.2.3

  # Selector de imagen (foto del gato)
  image_picker: ^1.1.2

  # Generación de PDF
  pdf: ^3.11.0
  printing: ^5.13.1

  # Rutas del sistema de archivos
  path_provider: ^2.1.5

  # Fechas formateadas
  intl: ^0.19.0

  # Íconos
  cupertino_icons: ^1.0.6
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: 6.2.1
  cloud_firestore: ^6.1.3
  url_launcher: ^6.3.2
  record: ^6.2.0

flutter:
  uses-material-design: true
dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
